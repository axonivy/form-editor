packages:
  - packages/*
  - integrations/*
  - playwright
registries:
  '@axonivy': https://npmjs-registry.ivyteam.ch/
allowBuilds:
  '@swc/core': false
minimumReleaseAgeExclude:
  - '@axonivy/*'
preferWorkspacePackages: true
publicHoistPattern:
  - eslint
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 43200 # minutes (30 days)
verifyDepsBeforeRun: warn
